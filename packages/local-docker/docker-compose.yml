# This is meant for local development only. Do not use this in production.
name: cap-so-dev

services:
  ps-mysql:
    container_name: mysql-primary-db
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: planetscale
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    command:
      [
        "--max_connections=1000",
        "--default-authentication-plugin=mysql_native_password",
      ]
    ports:
      - 3306:3306
    volumes:
      - ps-mysql:/var/lib/mysql

  cap-media-server:
    container_name: cap-media-server-dev
    build:
      context: ../..
      dockerfile: apps/media-server/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: 3456
      MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET:-local-media-server-secret}

  # Local S3 Strorage
  minio:
    container_name: minio-storage
    image: "minio/minio:latest"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: capS3root
      MINIO_ROOT_PASSWORD: capS3root
    volumes:
      - ~/minio/data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    container_name: minio-bucket-creation
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 capS3root capS3root;
      /usr/bin/mc mb myminio/capso;
      echo '{\"Version\": \"2012-10-17\",\"Statement\": [{\"Effect\": \"Allow\",\"Principal\": {\"AWS\": [\"*\"]},\"Action\": [\"s3:GetObject\"],\"Resource\": [\"arn:aws:s3:::capso/*\"]}]}' > /tmp/policy.json;
      /usr/bin/mc anonymous set-json /tmp/policy.json myminio/capso;
      exit 0;
      "

  tinybird-local:
    profiles: ["analytics"]
    container_name: cap-tinybird-local
    image: tinybirdco/tinybird-local@sha256:fd4284d2f1ad6a448823e5bc6414267848da964823dc9f98670793bb88031e4d
    platform: linux/amd64
    restart: unless-stopped
    environment:
      TB_LOCAL_USER_TOKEN: ${TB_LOCAL_USER_TOKEN:-}
      TB_LOCAL_WORKSPACE_TOKEN: ${TB_LOCAL_WORKSPACE_TOKEN:-}
    ports:
      - "127.0.0.1:${TINYBIRD_LOCAL_PORT:-7181}:7181"
    volumes:
      - tinybird-clickhouse:/var/lib/clickhouse
      - tinybird-metadata:/redis-data

  tinybird-cli:
    profiles: ["analytics"]
    image: tinybirdco/tb-cli-docker:4.6.9@sha256:6f72ef340cb4ec6a4c4b4e724da4c48799c81c89912130dc7cd4cc61efc13945
    depends_on:
      - tinybird-local
    network_mode: "service:tinybird-local"
    working_dir: /workspace/tinybird
    entrypoint: ["tb"]
    environment:
      TB_LOCAL: "1"
      TB_TOKEN: ${TB_LOCAL_WORKSPACE_TOKEN:-}
      TB_USER_TOKEN: ${TB_LOCAL_USER_TOKEN:-}
      TINYBIRD_TOKEN: ${TB_LOCAL_WORKSPACE_TOKEN:-}
      TINYBIRD_URL: http://127.0.0.1:7181
      PRODUCT_ANALYTICS_TINYBIRD_HOST: http://127.0.0.1:7181
      PRODUCT_ANALYTICS_TINYBIRD_TOKEN: ${TB_LOCAL_WORKSPACE_TOKEN:-}
    volumes:
      - ../../scripts/analytics/tinybird:/workspace/tinybird:ro
      - ../../scripts/analytics/tinybird-local-workspace.json:/workspace/.tinyb:ro

  tinybird-cloud-cli:
    profiles: ["analytics"]
    image: tinybirdco/tb-cli-docker:4.6.9@sha256:6f72ef340cb4ec6a4c4b4e724da4c48799c81c89912130dc7cd4cc61efc13945
    working_dir: /workspace
    entrypoint: ["tb"]
    environment:
      TINYBIRD_TOKEN: ${TINYBIRD_TOKEN:-}
      TINYBIRD_URL: ${TINYBIRD_URL:-https://api.tinybird.co}
      TB_TOKEN: ${TB_TOKEN:-}
      TB_HOST: ${TB_HOST:-https://api.tinybird.co}
    volumes:
      - ../../scripts/analytics/tinybird:/workspace:ro
volumes:
  ps-mysql:
  minio-data:
  minio-certs:
  tinybird-clickhouse:
  tinybird-metadata:
